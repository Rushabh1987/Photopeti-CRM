{% set no_shoots = brand.shoots | length == 0 %}
<div class="payment-area {% if brand.payment_done %}done{% endif %} {% if no_shoots %}payment-disabled{% endif %}">
  {% if no_shoots %}
    <input type="checkbox" class="toggle" disabled title="Add a shoot before marking payment"
           {% if brand.payment_done %}checked{% endif %}>
  {% else %}
    <form method="post" action="/ui/brands/{{ brand.id }}/toggle-payment">
      <input type="checkbox" class="toggle" {% if brand.payment_done %}checked{% endif %}>
    </form>
  {% endif %}
  <span>Payment {{ 'received' if brand.payment_done else 'pending' }}</span>
</div>
