<tr id="lead-{{ lead.id }}">
  <td class="td-name">{{ brand_name or '—' }}</td>
  <td><span class="badge badge-{{ lead.source }}">{{ lead.source }}</span></td>
  <td>
    <select class="status-select s-{{ lead.status }}"
            name="status"
            hx-post="/ui/leads/{{ lead.id }}/status"
            hx-trigger="change"
            hx-target="#lead-{{ lead.id }}"
            hx-swap="outerHTML"
            hx-include="this">
      {% for s in ['new', 'replied', 'converted', 'closed'] %}
        <option value="{{ s }}" {% if lead.status == s %}selected{% endif %}>
          {{ s | replace('_', ' ') | title }}
        </option>
      {% endfor %}
    </select>
  </td>
  <td class="td-muted">{{ lead.first_contact_at.strftime('%d %b %Y') }}</td>
  <td class="td-muted">{{ lead.last_activity_at.strftime('%d %b %Y') }}</td>
  <td class="td-actions">
    <a href="/leads/{{ lead.id }}" class="btn-icon" title="View">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7">
        <path d="M2 10s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z"/>
        <circle cx="10" cy="10" r="2.5"/>
      </svg>
    </a>
    <a href="/leads/{{ lead.id }}/edit" class="btn-icon" title="Edit">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7">
        <path d="M13.5 3.5a2.121 2.121 0 013 3L7 16l-4 1 1-4 9.5-9.5z"/>
      </svg>
    </a>
    <form method="post" action="/ui/leads/{{ lead.id }}/delete" style="display:inline">
      <button type="button" class="btn-icon btn-icon-danger" title="Delete"
              data-message="Delete this lead and all its messages? This cannot be undone."
              onclick="showDeleteModal(this)">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7">
          <path d="M4 6h12M8 6V4h4v2M6 6l1 10h6l1-10"/>
        </svg>
      </button>
    </form>
  </td>
</tr>
