<tr class="{% if shoot.shoot_done and shoot.editing_done %}row-done{% endif %}">
  <td>{{ shoot.description or '—' }}</td>
  <td><span class="badge badge-{{ shoot.type }}">{{ shoot.type }}</span></td>
  <td class="td-muted">
    {% if shoot.shoot_date %}{{ shoot.shoot_date.strftime('%d %b %Y') }}{% else %}—{% endif %}
  </td>
  <td>
    <form method="post" action="/ui/shoots/{{ shoot.id }}/toggle-shoot-done">
      <input type="checkbox" class="toggle" {% if shoot.shoot_done %}checked{% endif %}
             onchange="this.form.submit()">
    </form>
  </td>
  <td>
    <form method="post" action="/ui/shoots/{{ shoot.id }}/toggle-editing-done">
      <input type="checkbox" class="toggle" {% if shoot.editing_done %}checked{% endif %}
             onchange="this.form.submit()">
    </form>
  </td>
  <td class="td-actions">
    <a href="/shoots/{{ shoot.id }}/edit" class="btn btn-xs btn-ghost">Edit</a>
    <form method="post" action="/ui/shoots/{{ shoot.id }}/delete" style="display:inline">
      <button type="button" class="btn btn-xs btn-danger"
              data-message="Delete this shoot? This cannot be undone."
              onclick="showDeleteModal(this)">Delete</button>
    </form>
  </td>
</tr>
