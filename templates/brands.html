{% extends "base.html" %}
{% block title %}Brands — Studio CRM{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">Brands</h1>
  </div>
</div>

<!-- Add brand form (collapsible) -->
<details class="add-panel">
  <summary class="btn btn-primary">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M10 4v12M4 10h12"/>
    </svg>
    Add Brand
  </summary>
  <div class="form-panel">
    <form method="POST" action="/ui/brands">
      <div class="form-grid">
        <div class="field">
          <label for="name">Brand name *</label>
          <input type="text" id="name" name="name" placeholder="e.g. Maggie" required>
        </div>
        <div class="field">
          <label for="instagram">Instagram handle</label>
          <input type="text" id="instagram" name="instagram" placeholder="@handle">
        </div>
        <div class="field">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210">
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="contact@brand.com">
        </div>
        <div class="field full">
          <label for="notes">Notes</label>
          <textarea id="notes" name="notes" placeholder="Any context about this brand..."></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save Brand</button>
      </div>
    </form>
  </div>
</details>

<!-- Search bar -->
<div class="search-filter-bar"
     hx-get="/brands"
     hx-target="#brands-results"
     hx-push-url="true"
     hx-trigger="input delay:300ms from:input[name='q']"
     hx-include="input[name='q']">
  <div class="search-input-wrap">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7">
      <circle cx="9" cy="9" r="5.5"/>
      <path d="M13.5 13.5L17 17"/>
    </svg>
    <input class="search-input" name="q" type="search" value="{{ q }}"
           placeholder="Search by name or Instagram handle…" autocomplete="off">
  </div>
</div>

<!-- Results -->
<div id="brands-results">
  {% include "partials/brands_results.html" %}
</div>
{% endblock %}
