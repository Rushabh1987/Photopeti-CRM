<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Photopeti</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #0C0B0A;
      --surface:     #141210;
      --surface-2:   #1C1916;
      --border:      #2A2623;
      --accent:      #D97706;
      --accent-h:    #F59E0B;
      --text:        #EDE7DC;
      --text-2:      #A89F94;
      --text-3:      #5C5750;
      --red:         #F87171;
      --radius:      7px;
      --font-display:'Fraunces', Georgia, serif;
      --font-body:   'Syne', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2.5rem 2rem 2rem;
      animation: fadeUp 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 2rem;
    }

    .logo-img {
      height: 52px;
      width: auto;
    }

    .logo-name {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    .logo-tag {
      font-size: 0.72rem;
      color: var(--text-3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: -0.25rem;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 1.5rem;
    }

    .error {
      background: rgba(248,113,113,.08);
      border: 1px solid rgba(248,113,113,.22);
      border-radius: var(--radius);
      color: var(--red);
      font-size: 0.8rem;
      padding: 0.55rem 0.85rem;
      margin-bottom: 1.1rem;
      text-align: center;
    }

    .field { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 0.72rem;
      color: var(--text-2);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.9rem;
      padding: 0.65rem 0.85rem;
      outline: none;
      transition: border-color 0.14s ease;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
    }

    input::placeholder { color: var(--text-3); }

    .btn {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #0C0B0A;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-top: 0.5rem;
      padding: 0.72rem;
      text-transform: uppercase;
      transition: background 0.14s ease;
    }

    .btn:hover { background: var(--accent-h); }
    .btn:active { transform: scale(0.99); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="/static/photopeti.png" alt="Photopeti" class="logo-img">
      <span class="logo-name">Photopeti</span>
      <span class="logo-tag">Studio CRM</span>
    </div>

    <div class="divider"></div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" placeholder="Enter username"
               autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter password"
               autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>
  </div>
</body>
</html>
