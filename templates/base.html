<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Studio CRM{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body>

  <!-- Sidebar (desktop) -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      Studio<span class="logo-accent">CRM</span>
    </div>
    <ul class="nav-list">
      <li>
        <a href="/dashboard" class="nav-item {% if active == 'dashboard' %}active{% endif %}">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
            <rect x="2" y="2" width="7" height="7" rx="1.5"/>
            <rect x="11" y="2" width="7" height="7" rx="1.5"/>
            <rect x="2" y="11" width="7" height="7" rx="1.5"/>
            <rect x="11" y="11" width="7" height="7" rx="1.5"/>
          </svg>
          Dashboard
        </a>
      </li>
      <li>
        <a href="/brands" class="nav-item {% if active == 'brands' %}active{% endif %}">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
            <rect x="2" y="7" width="16" height="11" rx="2"/>
            <path d="M7 7V5.5a3 3 0 016 0V7"/>
          </svg>
          Brands
        </a>
      </li>
      <li>
        <a href="/leads" class="nav-item {% if active == 'leads' %}active{% endif %}">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
            <circle cx="10" cy="6" r="3"/>
            <path d="M3 17a7 7 0 0114 0"/>
          </svg>
          Leads
        </a>
      </li>
    </ul>
  </nav>

  <!-- Top bar (mobile) -->
  <header class="topbar">
    Studio<span class="logo-accent">CRM</span>
  </header>

  <!-- Main content -->
  <main class="main">
    {% block content %}{% endblock %}
  </main>

  <!-- Bottom nav (mobile) -->
  <nav class="bottom-nav">
    <a href="/dashboard" class="bnav-item {% if active == 'dashboard' %}active{% endif %}">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
        <rect x="2" y="2" width="7" height="7" rx="1.5"/>
        <rect x="11" y="2" width="7" height="7" rx="1.5"/>
        <rect x="2" y="11" width="7" height="7" rx="1.5"/>
        <rect x="11" y="11" width="7" height="7" rx="1.5"/>
      </svg>
      <span>Dashboard</span>
    </a>
    <a href="/brands" class="bnav-item {% if active == 'brands' %}active{% endif %}">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
        <rect x="2" y="7" width="16" height="11" rx="2"/>
        <path d="M7 7V5.5a3 3 0 016 0V7"/>
      </svg>
      <span>Brands</span>
    </a>
    <a href="/leads" class="bnav-item {% if active == 'leads' %}active{% endif %}">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
        <circle cx="10" cy="6" r="3"/>
        <path d="M3 17a7 7 0 0114 0"/>
      </svg>
      <span>Leads</span>
    </a>
  </nav>

  {% block scripts %}{% endblock %}
</body>
</html>
