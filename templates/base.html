<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Studio CRM{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body>

  <!-- Sidebar (desktop) -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <img src="/static/photopeti.png" alt="Photopeti" class="logo-img">
    </div>
    <ul class="nav-list">
      <li>
        <a href="/dashboard" class="nav-item {% if active == 'dashboard' %}active{% endif %}">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
            <rect x="2" y="2" width="7" height="7" rx="1.5"/>
            <rect x="11" y="2" width="7" height="7" rx="1.5"/>
            <rect x="2" y="11" width="7" height="7" rx="1.5"/>
            <rect x="11" y="11" width="7" height="7" rx="1.5"/>
          </svg>
          Dashboard
        </a>
      </li>
      <li>
        <a href="/brands" class="nav-item {% if active == 'brands' %}active{% endif %}">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
            <rect x="2" y="7" width="16" height="11" rx="2"/>
            <path d="M7 7V5.5a3 3 0 016 0V7"/>
          </svg>
          Brands
        </a>
      </li>
      <li>
        <a href="/leads" class="nav-item {% if active == 'leads' %}active{% endif %}">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
            <circle cx="10" cy="6" r="3"/>
            <path d="M3 17a7 7 0 0114 0"/>
          </svg>
          Leads
        </a>
      </li>
    </ul>
    <form method="post" action="/logout" class="sidebar-logout">
      <button type="submit" class="logout-btn" title="Sign out">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M7 3H4a1 1 0 00-1 1v12a1 1 0 001 1h3"/>
          <path d="M13 14l3-4-3-4"/>
          <path d="M16 10H7"/>
        </svg>
        Sign Out
      </button>
    </form>
  </nav>

  <!-- Top bar (mobile) -->
  <header class="topbar">
    <img src="/static/photopeti.png" alt="Photopeti" class="logo-img">
    <form method="post" action="/logout">
      <button type="submit" class="topbar-logout" title="Sign out">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M7 3H4a1 1 0 00-1 1v12a1 1 0 001 1h3"/>
          <path d="M13 14l3-4-3-4"/>
          <path d="M16 10H7"/>
        </svg>
      </button>
    </form>
  </header>

  <!-- Main content -->
  <main class="main">
    {% block content %}{% endblock %}
  </main>

  <!-- Bottom nav (mobile) -->
  <nav class="bottom-nav">
    <a href="/dashboard" class="bnav-item {% if active == 'dashboard' %}active{% endif %}">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
        <rect x="2" y="2" width="7" height="7" rx="1.5"/>
        <rect x="11" y="2" width="7" height="7" rx="1.5"/>
        <rect x="2" y="11" width="7" height="7" rx="1.5"/>
        <rect x="11" y="11" width="7" height="7" rx="1.5"/>
      </svg>
      <span>Dashboard</span>
    </a>
    <a href="/brands" class="bnav-item {% if active == 'brands' %}active{% endif %}">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
        <rect x="2" y="7" width="16" height="11" rx="2"/>
        <path d="M7 7V5.5a3 3 0 016 0V7"/>
      </svg>
      <span>Brands</span>
    </a>
    <a href="/leads" class="bnav-item {% if active == 'leads' %}active{% endif %}">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
        <circle cx="10" cy="6" r="3"/>
        <path d="M3 17a7 7 0 0114 0"/>
      </svg>
      <span>Leads</span>
    </a>
  </nav>

  {% block scripts %}{% endblock %}

  <!-- Delete confirmation modal -->
  <div id="delete-modal" class="modal-overlay" hidden>
    <div class="modal-card">
      <div class="modal-icon">
        <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="26" cy="26" r="26" fill="rgba(248,113,113,0.1)"/>
          <path d="M15 20h22M20 20v-2a2 2 0 012-2h8a2 2 0 012 2v2M18 20l1.8 15h12.4L34 20"
                stroke="#F87171" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M22 26v6M30 26v6"
                stroke="#F87171" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <h3 class="modal-title">Are you sure?</h3>
      <p class="modal-message" id="delete-modal-msg"></p>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="delete-cancel-btn">Cancel</button>
        <button class="btn btn-danger" id="delete-confirm-btn">Delete</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var _form = null;
      var overlay = document.getElementById('delete-modal');
      var msgEl   = document.getElementById('delete-modal-msg');
      var confirmBtn = document.getElementById('delete-confirm-btn');
      var cancelBtn  = document.getElementById('delete-cancel-btn');

      window.showDeleteModal = function (btn) {
        _form = btn.closest('form');
        msgEl.textContent = btn.dataset.message || 'This action cannot be undone.';
        overlay.removeAttribute('hidden');
        document.body.style.overflow = 'hidden';
        cancelBtn.focus();
      };

      function close() {
        overlay.setAttribute('hidden', '');
        document.body.style.overflow = '';
        _form = null;
      }

      confirmBtn.addEventListener('click', function () {
        if (_form) _form.submit();
      });

      cancelBtn.addEventListener('click', close);

      overlay.addEventListener('click', function (e) {
        if (e.target === overlay) close();
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && !overlay.hasAttribute('hidden')) close();
      });
    })();
  </script>
</body>
</html>
